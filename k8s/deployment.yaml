apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: flask-app
          image: 324621154851.dkr.ecr.ap-south-1.amazonaws.com/flask-cicd:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 5000